<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>architecture-diagram-generator - Architecture Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <style>
        :root {
            --bg-main: #020617;
            --bg-card: rgba(15, 23, 42, 0.8);
            --bg-accent: rgba(56, 189, 248, 0.15);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --accent-glow: rgba(56, 189, 248, 0.5);
            --border: rgba(255, 255, 255, 0.08);
            --glass: blur(16px) saturate(200%);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(129, 140, 248, 0.05) 0px, transparent 50%);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            padding: 0.85rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 0 20px var(--accent-glow);
            color: white;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #diagram-container {
            flex: 1;
            position: relative;
            background: var(--bg-main);
            overflow: hidden;
        }

        .legend {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: var(--shadow-lg);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .toolbar {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            z-index: 100;
        }

        .view-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .view-select:hover {
            border-color: var(--accent);
        }

        .details-panel {
            position: absolute;
            top: 2rem;
            right: 2rem;
            width: 300px;
            background: var(--bg-card);
            backdrop-filter: var(--glass);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 1.5rem;
            transform: translateX(400px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 60;
        }

        .details-panel.open {
            transform: translateX(0);
        }

        .btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn.active {
            color: var(--accent);
            background: var(--bg-accent);
        }

        .metric-card {
            background: rgba(0,0,0,0.2);
            padding: 0.75rem;
            border-radius: 8px;
            margin-top: 1rem;
            border: 1px solid var(--border);
        }

        .metric-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        
        #cy {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          z-index: 10;
          background: var(--bg-main);
        }
        #cy svg { display: block; width: 100%; height: 100%; }
        rect.node-rect {
          rx: 8;
          cursor: pointer;
          transition: opacity 0.2s;
        }
        line.edge {
          pointer-events: none;
        }
        text.node-label {
          font: 600 11px Outfit, sans-serif;
          pointer-events: none;
          fill: #f1f5f9;
          text-anchor: middle;
          dominant-baseline: central;
        }
        text.band-label {
          font: 700 13px Outfit, sans-serif;
          pointer-events: none;
        }
        text.domain-label {
          font: 400 10px Outfit, sans-serif;
          pointer-events: none;
        }
        rect.band {
          pointer-events: none;
        }
        rect.band-accent {
          pointer-events: none;
        }
        .node-tooltip {
          position: absolute;
          background: var(--bg-card);
          backdrop-filter: var(--glass);
          padding: 0.75rem;
          border-radius: 8px;
          border: 1px solid var(--border);
          font-size: 0.75rem;
          color: var(--text-primary);
          pointer-events: none;
          z-index: 2000;
          display: none;
          box-shadow: var(--shadow-lg);
          max-width: 260px;
        }
        .tooltip-row { display: flex; justify-content: space-between; gap: 1rem; margin-top: 0.25rem; }
        .tooltip-label { color: var(--text-secondary); }
        .issue-item { padding: 0.5rem; border-radius: 6px; margin-bottom: 0.4rem; font-size: 0.75rem; line-height: 1.4; }
        .issue-item.critical { background: rgba(239,68,68,0.15); border-left: 3px solid #ef4444; }
        .issue-item.high     { background: rgba(251,146,60,0.15);  border-left: 3px solid #fb923c; }
        .issue-item.medium   { background: rgba(251,191,36,0.15);  border-left: 3px solid #fbbf24; }
        .issue-item.low      { background: rgba(148,163,184,0.1);  border-left: 3px solid #94a3b8; }
      

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    </style>
</head>

                <div class="legend-item"><div class="legend-color" style="background: #64748b;"></div> External</div>

                <div style="margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border);">
                    <div style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 700;">Complexity</div>

                    <div class="legend-item"><div class="legend-color" style="background: #eab308;"></div> Medium</div>

                    <div class="legend-item"><div class="legend-color" style="background: #ef4444;"></div> Critical</div>
                </div>
            </div>
            <div id="details-panel" class="details-panel">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                    <h2 id="details-title" style="margin: 0; font-size: 1.1rem; color: var(--accent);">Node Details</h2>
                    <button onclick="closeDetails()" style="background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem;">&times;</button>
                </div>
                <div id="details-content">
                    <p style="font-size: 0.85rem; color: var(--text-secondary);">Select a node to view its architectural properties.</p>
                </div>
            </div>
            <div class="toolbar">
                <div style="display: flex; align-items: center; background: rgba(0,0,0,0.2); padding: 0.25rem 0.75rem; border-radius: 12px; border: 1px solid var(--border); width: 200px;">
                    <span style="font-size: 0.8rem; opacity: 0.5; margin-right: 0.5rem;">🔍</span>
                    <input type="text" id="node-search" placeholder="Search module..."

                </div>
                <div style="width: 1px; height: 24px; background: var(--border); margin: 0 0.25rem;"></div>
                <div style="display: flex; align-items: center; gap: 0.5rem; margin-right: 0.5rem;">
                    <span style="font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em;">Domain</span>
                    <select class="view-select" onchange="window.filterDomain(this.value)">

                        <option value="core">core</option><option value="generators">generators</option><option value="parsers">parsers</option><option value="shared">shared</option><option value="utils">utils</option>

                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <button class="btn" onclick="window.resetZoom()">Reset View</button>

                    <div style="width: 1px; height: 16px; background: var(--border); margin: 0 0.25rem;"></div>
                    <label style="font-size: 0.75rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.4rem; cursor: pointer;">
                        <input type="checkbox" onchange="window.toggleHotspots(this.checked)" style="accent-color: var(--accent);">
                        Hotspots only
                    </label>
                </div>
            </div>
        </main>
    </div>

        // ── D3 init ──────────────────────────────────────────────────────────
        const container = document.getElementById('cy');
        const svg = d3.select(container).append('svg')
          .attr('width', '100%')
          .attr('height', '100%');

        // Arrowhead marker
        svg.append('defs').append('marker')
          .attr('id', 'arrowhead')
          .attr('viewBox', '0 0 10 10')
          .attr('refX', 9)

        svg.call(d3zoom);

        const g = svg.append('g');

        const bandGroup = g.append('g').attr('class', 'bands');

        // Band backgrounds
        bandGroup.selectAll('rect.band')
          .data(layerBands)
          .join('rect')
            .attr('class', 'band')
            .attr('x', 0)
            .attr('y', d => d.y)
            .attr('width', canvasW)
            .attr('height', d => d.height)

            .attr('class', 'band-accent')
            .attr('x', 0)
            .attr('y', d => d.y)
            .attr('width', 3)
            .attr('height', d => d.height)
            .attr('fill', d => d.color)
            .attr('opacity', 0.7);

        // Layer labels
        bandGroup.selectAll('text.band-label')
          .data(layerBands)
          .join('text')
            .attr('class', 'band-label')
            .attr('x', 10)
            .attr('y', d => d.y + 18)
            .attr('fill', d => d.color + 'cc')
            .text(d => d.layer.toUpperCase());

        // Domain labels
        layerBands.forEach(band => {
          if (band.domains) {
            bandGroup.selectAll(null)
              .data(band.domains.filter(d => d.name !== 'shared'))
              .join('text')
                .attr('class', 'domain-label')
                .attr('x', 12)
                .attr('y', d => d.y - 6)

            .attr('stroke', 'rgba(148,163,184,0.35)')
            .attr('stroke-width', 1.5)
            .attr('opacity', 0.6)
            .attr('marker-end', 'url(#arrowhead)')
            .attr('stroke-dasharray', d => d.data.isTypeOnly ? '6 4' : null);

        // ── Nodes ────────────────────────────────────────────────────────────
        const nodeGroup = g.append('g').attr('class', 'nodes');

        const nodeElements = nodeGroup.selectAll('g.node')
          .data(graphData.nodes)
          .join('g')
            .attr('class', 'node')
            .attr('transform', d => {
              const h = NODE_H + Math.min(d.data.fanIn * 2, 20);
              return 'translate(' + (d.position.x - NODE_W/2) + ',' + (d.position.y - h/2) + ')';
            });

        // Node rect
        nodeElements.append('rect')
          .attr('class', 'node-rect')
          .attr('width', NODE_W)
          .attr('height', d => NODE_H + Math.min(d.data.fanIn * 2, 20))
          .attr('rx', 8)
          .attr('fill', '#1e293b')
          .attr('stroke', d => {
            if (d.data.severity) {
              if (d.data.severity === 'critical') return '#ef4444';
              if (d.data.severity === 'high') return '#fb923c';
              if (d.data.severity === 'medium') return '#fbbf24';
            }
            if (d.data.complexityTier) return COMPLEXITY_COLORS[d.data.complexityTier];
            return LAYER_COLORS[d.data.layer] || '#334155';
          })
          .attr('stroke-width', d => {
            if (d.data.severity === 'critical' || d.data.severity === 'high') return 3;
            if (d.data.complexityTier === 'high' || d.data.complexityTier === 'critical') return 3;
            return 2;
          })
          .attr('stroke-dasharray', d => d.data.layer === 'External' ? '6 4' : null);

        // Node label
        nodeElements.append('text')
          .attr('class', 'node-label')
          .attr('x', NODE_W / 2)
          .attr('y', d => (NODE_H + Math.min(d.data.fanIn * 2, 20)) / 2)
          .text(d => {
            const label = d.data.label;
            return label.length > 25 ? label.substring(0, 23) + '…' : label;
          });

        // Fan-in badge
        nodeElements.filter(d => d.data.fanIn >= 4)
          .append('text')
          .attr('x', NODE_W - 8)
          .attr('y', 14)
          .attr('text-anchor', 'end')
          .attr('fill', 'var(--accent)')
          .attr('font-size', '9px')
          .attr('font-weight', '800')
          .attr('opacity', 0.8)
          .text(d => '↓' + d.data.fanIn);

        // ── Tooltip ──────────────────────────────────────────────────────────
        const tooltip = document.getElementById('tooltip');

        nodeElements
          .on('mouseover', function(event, d) {
            tooltip.innerHTML =
              '<div style="font-weight:700;margin-bottom:.5rem;border-bottom:1px solid var(--border);padding-bottom:.25rem;">' + d.data.label + '</div>' +
              '<div class="tooltip-row"><span class="tooltip-label">Path</span>' + d.data.id + '</div>' +
              '<div class="tooltip-row"><span class="tooltip-label">Layer</span>' + d.data.layer + '</div>' +
              '<div class="tooltip-row"><span class="tooltip-label">Domain</span>' + d.data.domain + '</div>' +
              (d.data.sloc ? '<div class="tooltip-row"><span class="tooltip-label">SLOC</span>' + d.data.sloc + '</div>' : '') +
              (d.data.complexity ? '<div class="tooltip-row"><span class="tooltip-label">Complexity</span>' + d.data.complexity + '</div>' : '');
            tooltip.style.display = 'block';

            // Focus: fade non-connected
            const connectedIds = new Set([d.data.id]);
            graphData.edges.forEach(e => {
              if (e.data.source === d.data.id) connectedIds.add(e.data.target);
              if (e.data.target === d.data.id) connectedIds.add(e.data.source);
            });

            nodeElements.attr('opacity', n => connectedIds.has(n.data.id) ? 1 : 0.08);
            edgeElements.attr('opacity', e =>
              e.data.source === d.data.id || e.data.target === d.data.id ? 1 : 0.05
            ).attr('stroke', e =>
              e.data.source === d.data.id || e.data.target === d.data.id ? '#38bdf8' : 'rgba(148,163,184,0.35)'
            ).attr('stroke-width', e =>
              e.data.source === d.data.id || e.data.target === d.data.id ? 2.5 : 1.5
            );
          })
          .on('mousemove', function(event) {
            tooltip.style.left = (event.clientX + 16) + 'px';
            tooltip.style.top  = (event.clientY + 16) + 'px';
          })
          .on('mouseout', function() {
            tooltip.style.display = 'none';
            nodeElements.attr('opacity', 1);
            edgeElements
              .attr('opacity', 0.6)
              .attr('stroke', 'rgba(148,163,184,0.35)')
              .attr('stroke-width', 1.5);
          })
          .on('click', function(event, d) {
            window.showDetails(d.data.id);
          });

        window.filterDomain = (domain) => {
          if (!domain) {
            nodeElements.attr('opacity', 1);
            edgeElements.attr('opacity', 0.6);
            return;
          }
          nodeElements.attr('opacity', d =>
            d.data.domain === domain || d.data.layer === domain ? 1 : 0.08
          );
          edgeElements.attr('opacity', e => {
            const src = graphData.nodes.find(n => n.data.id === e.data.source);
            const tgt = graphData.nodes.find(n => n.data.id === e.data.target);
            const srcMatch = src && (src.data.domain === domain || src.data.layer === domain);
            const tgtMatch = tgt && (tgt.data.domain === domain || tgt.data.layer === domain);
            return srcMatch || tgtMatch ? 0.6 : 0.05;
          });
        };
        
        // ── Search & Focus ───────────────────────────────────────────────────
        window.searchNodes = (query) => {
          if (!query || query.length < 2) {
            nodeElements.attr('opacity', 1);
            edgeElements.attr('opacity', 0.6);
            return;
          }
          const q = query.toLowerCase();
          let firstMatch = null;
          
          nodeElements.attr('opacity', d => {
            const isMatch = d.data.label.toLowerCase().includes(q) || d.data.id.toLowerCase().includes(q);
            if (isMatch && !firstMatch) firstMatch = d;
            return isMatch ? 1 : 0.08;
          });
          
          edgeElements.attr('opacity', 0.05);
          
          if (firstMatch) {
            const cRect = container.getBoundingClientRect();
            const tx = cRect.width / 2 - firstMatch.position.x;
            const ty = cRect.height / 2 - firstMatch.position.y;
            svg.transition().duration(500).call(
              d3zoom.transform,
              d3.zoomIdentity.translate(tx, ty).scale(1)
            );
          }
        };

        // ── Reset zoom ───────────────────────────────────────────────────────
        window.resetZoom = () => {
          svg.transition().duration(400).call(
            d3zoom.transform,
            d3.zoomIdentity.translate(60, 60).scale(1)
          );
        };

        // ── Hotspot Filter ──────────────────────────────────────────────────
        window.toggleHotspots = (enabled) => {
          if (!enabled) {
            nodeElements.attr('opacity', 1);
            edgeElements.attr('opacity', 0.6);
            return;
          }
          nodeElements.attr('opacity', d => 
            d.data.complexityTier === 'high' || d.data.complexityTier === 'critical' ? 1 : 0.08
          );
          edgeElements.attr('opacity', 0.05);
        };

        // ── Macro View Toggle ────────────────────────────────────────────────
        window.isMacro = false;
        window.toggleMacroView = () => {
          window.isMacro = !window.isMacro;
          const btn = document.getElementById('btn-macro');
          if (window.isMacro) {
            btn.innerText = 'Detailed View';
            btn.classList.add('active');
            nodeGroup.attr('display', 'none');
            edgeGroup.attr('display', 'none');
            renderMacro();
          } else {
            btn.innerText = 'Macro View';
            btn.classList.remove('active');
            nodeGroup.attr('display', null);
            edgeGroup.attr('display', null);
            g.selectAll('.macro-group').remove();
          }
        };

        function renderMacro() {
          const macroGroup = g.append('g').attr('class', 'macro-group');
          
          macroGroup.selectAll('line.macro-edge')
            .data(macroEdges)
            .join('line')
              .attr('class', 'macro-edge')
              .attr('x1', d => macroNodes.find(n => n.id === d.from).x)
              .attr('y1', d => macroNodes.find(n => n.id === d.from).y)
              .attr('x2', d => macroNodes.find(n => n.id === d.to).x)
              .attr('y2', d => macroNodes.find(n => n.id === d.to).y)
              .attr('stroke', 'rgba(148,163,184,0.4)')
              .attr('stroke-width', d => Math.max(1, Math.log(d.weight + 1) * 2))
              .attr('marker-end', 'url(#arrowhead)');

          const mn = macroGroup.selectAll('g.macro-node')
            .data(macroNodes)
            .join('g')
              .attr('class', 'macro-node')
              .attr('transform', d => 'translate(' + (d.x - 80) + ',' + (d.y - 32) + ')');

          mn.append('rect')
            .attr('width', 160)
            .attr('height', 64)
            .attr('rx', 8)
            .attr('fill', d => LAYER_COLORS[d.layer] + '22')
            .attr('stroke', d => LAYER_COLORS[d.layer])
            .attr('stroke-width', 2);

          mn.append('text')
            .attr('text-anchor', 'middle')
            .attr('fill', '#f1f5f9')
            .attr('font', '700 13px Outfit')
            .attr('x', 80)
            .attr('y', 28)
            .text(d => d.label);

          mn.append('text')
            .attr('text-anchor', 'middle')
            .attr('fill', '#94a3b8')
            .attr('font', '400 11px Outfit')
            .attr('opacity', 0.7)
            .attr('x', 80)
            .attr('y', 48)
            .text(d => d.count + ' modules');
        }

        // Fit on load
        const cRect = container.getBoundingClientRect();
        const scaleX = cRect.width / (canvasW + 120);
        const scaleY = cRect.height / (totalHeight + 120);
        const initScale = Math.min(scaleX, scaleY, 1);
        const tx = (cRect.width - canvasW * initScale) / 2;
        const ty = 20;
        svg.call(d3zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(initScale));

        // Auto-macro for large projects
        if (graphData.nodes.length > 50) {
          window.toggleMacroView();
        }
      

            // UI Logic
            window.resetView = () => {
                window.resetZoom();
                closeDetails();
            };

            function showDetails(nodeId) {
                if (!window.graphData) return;
                const node = window.graphData.nodes.find(n => n.data.id === nodeId);
                if (!node) return;

                const panel = document.getElementById('details-panel');
                const title = document.getElementById('details-title');
                const content = document.getElementById('details-content');
                
                panel.classList.add('open');
                title.innerText = node.data.label || node.data.id.split('/').pop();
                
                const metrics = { sloc: node.data.sloc, complexity: node.data.complexity };
                
                content.innerHTML = '<div style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem; word-break: break-all; font-family: monospace; opacity: 0.7;">'
                    + node.data.id + '</div>'
                    + '<div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">'
                    + '<span style="background: var(--bg-accent); color: var(--accent); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 700; border: 1px solid rgba(56, 189, 248, 0.2);">' + (node.data.layer || 'CORE') + '</span>'
                    + '</div>'
                    + '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">'
                    + '<div class="metric-card"><div class="metric-value">' + (metrics.sloc || '-') + '</div><div class="metric-label">SLOC</div></div>'
                    + '<div class="metric-card"><div class="metric-value">' + (metrics.complexity || '-') + '</div><div class="metric-label">Complexity</div></div>'
                    + '</div>';
            }
            window.showDetails = showDetails;

            window.closeDetails = () => {
                document.getElementById('details-panel').classList.remove('open');
            };
        });
    </script>
</body>
</html>
